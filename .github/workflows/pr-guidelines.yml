name: "Guideline Enforcement"

on:
  pull_request:
    branches: [ "main" ]

jobs:
  check-progress-tracker:
    name: "Enforce progress-tracker.md Update"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para fazer o diff com a base branch
          
      - name: Verify progress-tracker.md modification
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^docs/guidelines/progress-tracker\.md$"; then
            echo "✅ progress-tracker.md foi atualizado. Bom trabalho!"
            exit 0
          else
            echo "❌ ERRO: O arquivo docs/guidelines/progress-tracker.md NÃO foi modificado."
            echo "O fluxo de trabalho (Spec-Driven) exige que o rastreador seja atualizado em todos os PRs."
            echo "Por favor, adicione uma modificação ao progress-tracker.md e faça o push novamente."
            exit 1
          fi
